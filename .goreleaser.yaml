# This is an example .goreleaser.yaml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
    mod_timestamp: '{{ .CommitTimestamp }}'
    hooks:
      pre: go generate ./internal/...
      post:
        - ./generate_config.sh "{{ .Version }}" "{{ .Arch }}" "{{ .Path }}"

archives:
  - formats: ["tar.gz", "binary"]

  # - hooks:
  #     before:
  #       - echo 'hello'

  # - format: "binary"
  #   id: "pkg"
  #   name: 'bakepkg{{ if neq .Arch "all" }}-{{.Arch}}{{ end }}'

checksum:
  name_template: 'checksums.txt'
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
